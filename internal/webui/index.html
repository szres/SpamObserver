<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpamObserver - Telegram Anti-Spam Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: { 900: '#0d1117', 800: '#161b22', 700: '#21262d', 600: '#30363d', 500: '#484f58' }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .log-line { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; line-height: 1.6; }
    .log-terminal { scrollbar-width: thin; scrollbar-color: #30363d #0d1117; }
    .log-terminal::-webkit-scrollbar { width: 6px; }
    .log-terminal::-webkit-scrollbar-track { background: #0d1117; }
    .log-terminal::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-dark-900 text-gray-200 min-h-screen" x-data="app()" x-init="init()" x-cloak>

  <!-- Header (always visible) -->
  <div class="max-w-7xl mx-auto px-4 pt-6">
    <header class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <div class="w-3 h-3 rounded-full bg-green-500 pulse-dot"></div>
        <h1 class="text-xl font-bold text-white">SpamObserver</h1>
        <span class="text-xs bg-dark-700 text-gray-400 px-2 py-0.5 rounded">PASSIVE MONITOR</span>
        <span x-show="!botEnabled" class="text-xs bg-red-900 text-red-300 px-2 py-0.5 rounded font-medium">MONITORING PAUSED</span>
      </div>
      <div class="flex items-center gap-3">
        <template x-if="!authenticated">
          <button @click="showLoginModal = true" class="text-sm bg-dark-700 hover:bg-dark-600 text-gray-300 px-3 py-1.5 rounded transition">Login</button>
        </template>
        <template x-if="authenticated">
          <div class="flex items-center gap-3">
            <span class="text-sm text-gray-400" x-text="currentUser"></span>
            <button @click="showSettings = true" class="text-gray-500 hover:text-gray-300 transition" title="Settings">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
              </svg>
            </button>
            <button @click="logout()" class="text-sm text-gray-500 hover:text-red-400 transition">Logout</button>
          </div>
        </template>
      </div>
    </header>
  </div>

  <!-- Main Content (always visible) -->
  <div class="max-w-7xl mx-auto px-4 pb-6">

    <!-- Stats Row -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
      <div class="bg-dark-800 border border-dark-600 rounded-lg p-4" x-show="authenticated">
        <div class="text-xs text-gray-500 uppercase tracking-wider">Groups Monitored</div>
        <div class="text-2xl font-bold text-white mt-1" x-text="groups.length">0</div>
      </div>
      <div class="bg-dark-800 border border-dark-600 rounded-lg p-4">
        <div class="text-xs text-gray-500 uppercase tracking-wider">Events Logged</div>
        <div class="text-2xl font-bold text-white mt-1" x-text="logs.length">0</div>
      </div>
      <div class="bg-dark-800 border border-dark-600 rounded-lg p-4">
        <div class="text-xs text-gray-500 uppercase tracking-wider">Warnings</div>
        <div class="text-2xl font-bold text-yellow-400 mt-1" x-text="logs.filter(l => l.level === 'WARN').length">0</div>
      </div>
      <div class="bg-dark-800 border border-dark-600 rounded-lg p-4">
        <div class="text-xs text-gray-500 uppercase tracking-wider">Bot Status</div>
        <div class="text-2xl font-bold mt-1" :class="botEnabled ? 'text-green-400' : 'text-red-400'" 
          x-text="botEnabled ? 'ACTIVE' : 'PAUSED'">ACTIVE</div>
      </div>
    </div>

    <!-- Main Grid -->
    <div class="grid gap-6" :class="authenticated ? 'grid-cols-1 lg:grid-cols-3' : 'grid-cols-1'">
      
      <!-- Left: Groups + Filters (only when authenticated) -->
      <div x-show="authenticated" x-transition class="lg:col-span-1">
        <div class="bg-dark-800 border border-dark-600 rounded-lg overflow-hidden">
          <div class="px-4 py-3 border-b border-dark-600 flex items-center justify-between">
            <h2 class="font-semibold text-white">Monitored Groups</h2>
            <button @click="showAddGroup = !showAddGroup" 
              class="text-xs bg-blue-600 hover:bg-blue-700 text-white px-2 py-1 rounded transition">
              + Add
            </button>
          </div>
          
          <div x-show="showAddGroup" x-transition class="px-4 py-3 border-b border-dark-600 bg-dark-700">
            <form @submit.prevent="addGroup()" class="flex gap-2">
              <input type="number" x-model="newChatId" placeholder="Chat ID (e.g. -1001234567890)"
                class="flex-1 bg-dark-900 border border-dark-600 rounded px-3 py-1.5 text-sm text-white focus:outline-none focus:border-blue-500">
              <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded text-sm transition">Add</button>
            </form>
          </div>

          <div class="divide-y divide-dark-600 max-h-80 overflow-y-auto">
            <template x-if="groups.length === 0">
              <div class="px-4 py-6 text-center text-gray-500 text-sm">No groups configured</div>
            </template>
            <template x-for="g in groups" :key="g.chat_id">
              <div class="px-4 py-3 flex items-center justify-between hover:bg-dark-700 transition">
                <div>
                  <div class="text-sm font-mono text-white" x-text="g.chat_id"></div>
                  <div class="text-xs text-gray-500" x-text="'Added: ' + new Date(g.added_at).toLocaleDateString()"></div>
                </div>
                <button @click="removeGroup(g.chat_id)" 
                  class="text-xs text-red-400 hover:text-red-300 px-2 py-1 rounded hover:bg-dark-600 transition">
                  Remove
                </button>
              </div>
            </template>
          </div>
        </div>

        <!-- Quick Filters -->
        <div class="bg-dark-800 border border-dark-600 rounded-lg mt-4 overflow-hidden">
          <div class="px-4 py-3 border-b border-dark-600">
            <h2 class="font-semibold text-white">Filters</h2>
          </div>
          <div class="p-4 space-y-2">
            <div class="flex flex-wrap gap-1.5">
              <template x-for="cat in availableCategories" :key="cat">
                <button @click="toggleFilter(cat)"
                  :class="activeFilters.includes(cat) ? 'bg-blue-600 text-white' : 'bg-dark-700 text-gray-400 hover:bg-dark-600'"
                  class="text-xs px-2 py-1 rounded transition" x-text="cat"></button>
              </template>
            </div>
            <div x-show="activeFilters.length > 0" class="pt-2">
              <button @click="activeFilters = []" class="text-xs text-gray-500 hover:text-white transition">Clear filters</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Log Terminal -->
      <div :class="authenticated ? 'lg:col-span-2' : ''">
        <div class="bg-dark-800 border border-dark-600 rounded-lg overflow-hidden flex flex-col" :style="authenticated ? 'height: calc(100vh - 280px); min-height: 400px;' : 'height: calc(100vh - 200px); min-height: 400px;'">
          <div class="px-4 py-3 border-b border-dark-600 flex items-center justify-between">
            <h2 class="font-semibold text-white flex items-center gap-2">
              Live Event Log
              <span class="w-2 h-2 rounded-full bg-green-500 pulse-dot" x-show="sseConnected"></span>
            </h2>
            <div class="flex items-center gap-2">
              <input type="text" x-model="searchQuery" placeholder="Search logs..."
                class="bg-dark-900 border border-dark-600 rounded px-2 py-1 text-xs text-white w-40 focus:outline-none focus:border-blue-500">
              <button @click="autoScroll = !autoScroll"
                :class="autoScroll ? 'text-green-400' : 'text-gray-500'"
                class="text-xs px-2 py-1 rounded hover:bg-dark-600 transition" title="Auto-scroll">
                &#8595; Auto
              </button>
              <button @click="clearLogs()" class="text-xs text-gray-500 hover:text-white px-2 py-1 rounded hover:bg-dark-600 transition">Clear</button>
            </div>
          </div>
          
          <div class="flex-1 overflow-y-auto log-terminal p-2" x-ref="logContainer">
            <template x-if="filteredLogs.length === 0">
              <div class="text-center text-gray-600 text-sm py-8">Waiting for events...</div>
            </template>
            <template x-for="(log, idx) in filteredLogs" :key="idx">
              <div class="log-line flex gap-2 px-1 py-0.5 hover:bg-dark-700 rounded"
                :class="{
                  'text-gray-400': log.level === 'INFO',
                  'text-yellow-400': log.level === 'WARN',
                  'text-red-400': log.level === 'ERROR'
                }">
                <span class="text-gray-600 shrink-0 w-20" x-text="formatTime(log.timestamp)"></span>
                <span class="shrink-0 w-12 text-right"
                  :class="{
                    'text-blue-400': log.level === 'INFO',
                    'text-yellow-400': log.level === 'WARN',
                    'text-red-400': log.level === 'ERROR'
                  }" x-text="'[' + log.level + ']'"></span>
                <span class="shrink-0 w-24 text-cyan-400" x-text="'[' + log.category + ']'"></span>
                <span class="text-gray-200 break-all" x-text="log.message"></span>
                <span x-show="log.chat_id" class="shrink-0 text-gray-600 ml-auto" x-text="'chat:' + log.chat_id"></span>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div x-show="showLoginModal" x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center bg-black/60" @click.self="showLoginModal = false; loginError = ''">
    <div class="bg-dark-800 border border-dark-600 rounded-lg p-8 w-full max-w-sm shadow-xl" @click.stop>
      <div class="text-center mb-6">
        <h2 class="text-xl font-bold text-white mb-1">Sign In</h2>
        <p class="text-gray-400 text-sm">Login to manage groups and settings</p>
      </div>
      <form @submit.prevent="login()">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-400 mb-1">Username</label>
          <input type="text" x-model="loginForm.username"
            class="w-full bg-dark-900 border border-dark-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500 transition"
            autocomplete="username">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
          <input type="password" x-model="loginForm.password"
            class="w-full bg-dark-900 border border-dark-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500 transition"
            autocomplete="current-password"
            @keydown.enter="login()">
        </div>
        <div x-show="loginError" class="mb-4 text-red-400 text-sm" x-text="loginError"></div>
        <div class="flex gap-2">
          <button type="button" @click="showLoginModal = false; loginError = ''"
            class="flex-1 bg-dark-700 hover:bg-dark-600 text-gray-300 font-medium py-2 px-4 rounded transition">
            Cancel
          </button>
          <button type="submit"
            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded transition"
            :disabled="loginLoading">
            <span x-show="!loginLoading">Sign In</span>
            <span x-show="loginLoading">Authenticating...</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Settings Modal -->
  <div x-show="showSettings" x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center bg-black/60" @click.self="showSettings = false; resetSettings()">
    <div class="bg-dark-800 border border-dark-600 rounded-lg w-full max-w-md shadow-xl overflow-hidden" @click.stop>
      <div class="px-6 py-4 border-b border-dark-600 flex items-center justify-between">
        <h2 class="text-lg font-bold text-white">Settings</h2>
        <button @click="showSettings = false; resetSettings()" class="text-gray-500 hover:text-white transition text-xl">&times;</button>
      </div>

      <div class="p-6 space-y-6 max-h-[70vh] overflow-y-auto">
        <!-- Bot Toggle -->
        <div>
          <h3 class="text-sm font-semibold text-gray-300 mb-3 uppercase tracking-wider">Bot Monitoring</h3>
          <div class="flex items-center justify-between bg-dark-700 rounded-lg p-4">
            <div>
              <div class="text-sm text-white font-medium" x-text="botEnabled ? 'Monitoring Active' : 'Monitoring Paused'"></div>
              <div class="text-xs text-gray-500 mt-0.5">Toggle event processing on/off</div>
            </div>
            <button @click="toggleBot()"
              :class="botEnabled ? 'bg-green-600' : 'bg-dark-600'"
              class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none">
              <span :class="botEnabled ? 'translate-x-6' : 'translate-x-1'"
                class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform"></span>
            </button>
          </div>
        </div>

        <!-- Change Username -->
        <div>
          <h3 class="text-sm font-semibold text-gray-300 mb-3 uppercase tracking-wider">Change Username</h3>
          <form @submit.prevent="changeUsername()" class="space-y-3">
            <div>
              <label class="block text-xs text-gray-500 mb-1">New Username</label>
              <input type="text" x-model="usernameForm.new_username"
                class="w-full bg-dark-900 border border-dark-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition">
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Confirm Password</label>
              <input type="password" x-model="usernameForm.password"
                class="w-full bg-dark-900 border border-dark-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition">
            </div>
            <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 px-4 rounded transition"
              :disabled="settingsLoading">
              Update Username
            </button>
          </form>
        </div>

        <!-- Change Password -->
        <div>
          <h3 class="text-sm font-semibold text-gray-300 mb-3 uppercase tracking-wider">Change Password</h3>
          <form @submit.prevent="changePassword()" class="space-y-3">
            <div>
              <label class="block text-xs text-gray-500 mb-1">Current Password</label>
              <input type="password" x-model="passwordForm.current_password"
                class="w-full bg-dark-900 border border-dark-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition">
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">New Password</label>
              <input type="password" x-model="passwordForm.new_password"
                class="w-full bg-dark-900 border border-dark-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition">
            </div>
            <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 px-4 rounded transition"
              :disabled="settingsLoading">
              Update Password
            </button>
          </form>
        </div>

        <div x-show="settingsError" class="text-red-400 text-sm bg-red-900/20 rounded px-3 py-2" x-text="settingsError"></div>
        <div x-show="settingsSuccess" class="text-green-400 text-sm bg-green-900/20 rounded px-3 py-2" x-text="settingsSuccess"></div>
      </div>
    </div>
  </div>

  <script>
    function app() {
      return {
        authenticated: false,
        currentUser: '',
        showLoginModal: false,
        showSettings: false,
        loginForm: { username: '', password: '' },
        loginError: '',
        loginLoading: false,
        
        groups: [],
        newChatId: '',
        showAddGroup: false,
        
        logs: [],
        sseConnected: false,
        autoScroll: true,
        searchQuery: '',
        activeFilters: [],
        botEnabled: true,
        availableCategories: [
          'JOIN', 'BOT_JOIN', 'LEAVE', 'RESTRICT', 'BAN', 'REMOVE',
          'BOT_MSG', 'AD_LINK', 'AD_KEYWORD', 'BUTTON', 'URL_ENTITY',
          'TEXT_LINK', 'MENTION', 'HASHTAG', 'BOT_COMMAND', 'COMMAND'
        ],
        
        sseSource: null,

        passwordForm: { current_password: '', new_password: '' },
        usernameForm: { new_username: '', password: '' },
        settingsError: '',
        settingsSuccess: '',
        settingsLoading: false,

        init() {
          this.checkAuth();
          this.connectSSE();
          this.fetchBotStatus();
        },

        async checkAuth() {
          try {
            const r = await fetch('/api/auth/me');
            if (r.ok) {
              const d = await r.json();
              this.authenticated = true;
              this.currentUser = d.username;
              this.loadGroups();
            }
          } catch (e) {}
        },

        async fetchBotStatus() {
          try {
            const r = await fetch('/api/bot/status');
            if (r.ok) {
              const d = await r.json();
              this.botEnabled = d.enabled;
            }
          } catch (e) {}
        },

        async login() {
          this.loginError = '';
          this.loginLoading = true;
          try {
            const r = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.loginForm)
            });
            const d = await r.json();
            if (r.ok) {
              this.authenticated = true;
              this.currentUser = d.username;
              this.loginForm = { username: '', password: '' };
              this.loginError = '';
              this.showLoginModal = false;
              this.loadGroups();
            } else {
              this.loginError = d.error || 'Login failed';
            }
          } catch (e) {
            this.loginError = 'Network error';
          }
          this.loginLoading = false;
        },

        async logout() {
          await fetch('/api/auth/logout', { method: 'POST' });
          this.authenticated = false;
          this.currentUser = '';
          this.groups = [];
        },

        async loadGroups() {
          try {
            const r = await fetch('/api/config/groups');
            if (r.ok) {
              this.groups = await r.json() || [];
            }
          } catch (e) {}
        },

        async addGroup() {
          const id = parseInt(this.newChatId);
          if (isNaN(id)) return;
          try {
            const r = await fetch('/api/config/groups', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ chat_id: id })
            });
            if (r.ok) {
              this.newChatId = '';
              this.showAddGroup = false;
              this.loadGroups();
            }
          } catch (e) {}
        },

        async removeGroup(chatId) {
          try {
            await fetch('/api/config/groups/' + chatId, { method: 'DELETE' });
            this.loadGroups();
          } catch (e) {}
        },

        async toggleBot() {
          const newState = !this.botEnabled;
          try {
            const r = await fetch('/api/config/bot/toggle', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ enabled: newState })
            });
            if (r.ok) {
              const d = await r.json();
              this.botEnabled = d.enabled;
            }
          } catch (e) {}
        },

        async changePassword() {
          this.settingsError = '';
          this.settingsSuccess = '';
          if (!this.passwordForm.current_password || !this.passwordForm.new_password) {
            this.settingsError = 'Both fields are required';
            return;
          }
          if (this.passwordForm.new_password.length < 4) {
            this.settingsError = 'New password must be at least 4 characters';
            return;
          }
          this.settingsLoading = true;
          try {
            const r = await fetch('/api/config/auth/change-password', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.passwordForm)
            });
            const d = await r.json();
            if (r.ok) {
              this.settingsSuccess = 'Password updated successfully';
              this.passwordForm = { current_password: '', new_password: '' };
            } else {
              this.settingsError = d.error || 'Failed to update password';
            }
          } catch (e) {
            this.settingsError = 'Network error';
          }
          this.settingsLoading = false;
        },

        async changeUsername() {
          this.settingsError = '';
          this.settingsSuccess = '';
          if (!this.usernameForm.new_username || !this.usernameForm.password) {
            this.settingsError = 'Both fields are required';
            return;
          }
          this.settingsLoading = true;
          try {
            const r = await fetch('/api/config/auth/change-username', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.usernameForm)
            });
            const d = await r.json();
            if (r.ok) {
              this.settingsSuccess = 'Username updated successfully';
              this.currentUser = d.username;
              this.usernameForm = { new_username: '', password: '' };
            } else {
              this.settingsError = d.error || 'Failed to update username';
            }
          } catch (e) {
            this.settingsError = 'Network error';
          }
          this.settingsLoading = false;
        },

        resetSettings() {
          this.settingsError = '';
          this.settingsSuccess = '';
          this.passwordForm = { current_password: '', new_password: '' };
          this.usernameForm = { new_username: '', password: '' };
        },

        connectSSE() {
          if (this.sseSource) {
            this.sseSource.close();
          }
          this.sseSource = new EventSource('/api/logs/stream');
          this.sseSource.onopen = () => { this.sseConnected = true; };
          this.sseSource.onerror = () => {
            this.sseConnected = false;
            setTimeout(() => this.connectSSE(), 3000);
          };
          this.sseSource.addEventListener('log', (e) => {
            try {
              const entry = JSON.parse(e.data);
              this.logs.push(entry);
              if (this.logs.length > 2000) {
                this.logs = this.logs.slice(-1000);
              }
              if (this.autoScroll) {
                this.$nextTick(() => {
                  const c = this.$refs.logContainer;
                  if (c) c.scrollTop = c.scrollHeight;
                });
              }
            } catch (err) {}
          });
          this.sseSource.addEventListener('history', (e) => {
            try {
              const entries = JSON.parse(e.data);
              this.logs = entries;
              if (this.autoScroll) {
                this.$nextTick(() => {
                  const c = this.$refs.logContainer;
                  if (c) c.scrollTop = c.scrollHeight;
                });
              }
            } catch (err) {}
          });
        },

        toggleFilter(cat) {
          const idx = this.activeFilters.indexOf(cat);
          if (idx >= 0) {
            this.activeFilters.splice(idx, 1);
          } else {
            this.activeFilters.push(cat);
          }
        },

        clearLogs() {
          this.logs = [];
        },

        get filteredLogs() {
          let result = this.logs;
          if (this.activeFilters.length > 0) {
            result = result.filter(l => this.activeFilters.includes(l.category));
          }
          if (this.searchQuery.trim()) {
            const q = this.searchQuery.toLowerCase();
            result = result.filter(l => 
              l.message.toLowerCase().includes(q) || 
              l.category.toLowerCase().includes(q) ||
              (l.username && l.username.toLowerCase().includes(q))
            );
          }
          return result.slice(-200);
        },

        formatTime(ts) {
          if (!ts) return '';
          const d = new Date(ts);
          return d.toLocaleTimeString('en-GB', { hour12: false });
        }
      };
    }
  </script>
</body>
</html>
